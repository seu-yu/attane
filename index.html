<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Zen+Maru+Gothic:wght@400;500&display=swap');

  :root {
    --sky: #e8f4fd;
    --sky-mid: #c2dff5;
    --sky-deep: #8bbfe8;
    --blue: #4a90d9;
    --blue-dark: #2d6fad;
    --white: #ffffff;
    --text: #2c4a6e;
    --text-light: #6a8fbb;
    --cloud: rgba(255,255,255,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(170deg, #b8dff7 0%, #d4edfc 30%, #e8f6ff 60%, #f0faff 100%);
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  .cloud {
    position: fixed;
    background: var(--cloud);
    border-radius: 50px;
    opacity: 0.7;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: var(--cloud);
    border-radius: 50%;
  }
  .c1 { width: 120px; height: 38px; top: 8%; left: -10%; animation: drift 28s linear infinite; }
  .c1::before { width: 60px; height: 60px; top: -28px; left: 18px; }
  .c1::after  { width: 40px; height: 40px; top: -18px; left: 55px; }
  .c2 { width: 90px; height: 28px; top: 22%; left: -8%; animation: drift 38s linear infinite 6s; opacity: 0.5; }
  .c2::before { width: 45px; height: 45px; top: -22px; left: 12px; }
  .c2::after  { width: 30px; height: 30px; top: -14px; left: 40px; }
  .c3 { width: 150px; height: 44px; top: 60%; left: -12%; animation: drift 48s linear infinite 14s; opacity: 0.4; }
  .c3::before { width: 70px; height: 70px; top: -34px; left: 22px; }
  .c3::after  { width: 50px; height: 50px; top: -24px; left: 75px; }
  .c4 { width: 80px; height: 24px; top: 78%; left: -8%; animation: drift 33s linear infinite 20s; opacity: 0.5; }
  .c4::before { width: 38px; height: 38px; top: -18px; left: 10px; }
  .c4::after  { width: 26px; height: 26px; top: -12px; left: 36px; }

  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(120vw); } }

  .birds {
    position: fixed; top: 12%; left: -60px;
    animation: bird-fly 22s linear infinite 4s;
    pointer-events: none; opacity: 0.4;
  }
  .bird {
    display: inline-block; width: 18px; height: 6px;
    border-top: 2px solid var(--blue-dark); border-radius: 50% 50% 0 0;
    margin: 0 4px; animation: flap 0.7s ease-in-out infinite alternate;
  }
  .bird:nth-child(2) { animation-delay: 0.15s; margin-top: 6px; }
  .bird:nth-child(3) { animation-delay: 0.3s; }
  @keyframes flap { from { transform: scaleY(1); } to { transform: scaleY(-0.5); } }
  @keyframes bird-fly { from { transform: translateX(0) translateY(0); } to { transform: translateX(120vw) translateY(-30px); } }

  .sun {
    position: fixed; top: 5%; right: 8%;
    width: 64px; height: 64px;
    background: radial-gradient(circle, #ffe066, #f7c948);
    border-radius: 50%;
    box-shadow: 0 0 0 12px rgba(247,201,72,0.15), 0 0 0 24px rgba(247,201,72,0.07);
    pointer-events: none;
    animation: sun-pulse 4s ease-in-out infinite;
  }
  @keyframes sun-pulse {
    0%,100% { box-shadow: 0 0 0 12px rgba(247,201,72,0.15), 0 0 0 24px rgba(247,201,72,0.07); }
    50%      { box-shadow: 0 0 0 16px rgba(247,201,72,0.18), 0 0 0 32px rgba(247,201,72,0.08); }
  }

  .header { text-align: center; margin-bottom: 24px; position: relative; z-index: 1; }
  .title { font-size: 1.6rem; font-weight: 500; color: var(--blue-dark); letter-spacing: 0.15em; }
  .subtitle { font-size: 0.72rem; color: var(--text-light); margin-top: 4px; letter-spacing: 0.1em; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }

  .location-tabs {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 24px; position: relative; z-index: 1; max-width: 280px;
  }
  .tab {
    background: var(--white); border: 2px solid transparent; border-radius: 30px;
    padding: 7px 14px; font-size: 0.78rem; font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text-light); cursor: pointer; transition: all 0.22s ease;
    box-shadow: 0 2px 8px rgba(74,144,217,0.12); white-space: nowrap;
  }
  .tab:hover { border-color: var(--sky-deep); color: var(--blue); transform: translateY(-1px); }
  .tab.active { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 4px 14px rgba(74,144,217,0.35); transform: translateY(-1px); }

  .gacha-area { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
  .gacha-btn {
    width: 160px; height: 160px; border-radius: 50%; border: none;
    background: linear-gradient(145deg, #ffffff, #d4eaf9);
    box-shadow: 0 8px 32px rgba(74,144,217,0.25), 0 2px 8px rgba(74,144,217,0.15), inset 0 2px 6px rgba(255,255,255,0.9);
    cursor: pointer; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 6px; transition: all 0.2s ease; position: relative; overflow: hidden;
  }
  .gacha-btn::before {
    content: ''; position: absolute; inset: 8px; border-radius: 50%;
    border: 1.5px dashed rgba(74,144,217,0.2);
  }
  .gacha-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 40px rgba(74,144,217,0.3), 0 4px 12px rgba(74,144,217,0.2), inset 0 2px 6px rgba(255,255,255,0.9); }
  .gacha-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(74,144,217,0.2); }
  .gacha-emoji { font-size: 2.6rem; line-height: 1; transition: transform 0.3s ease; }
  .gacha-btn:hover .gacha-emoji { transform: scale(1.15) rotate(8deg); }
  .gacha-label { font-size: 0.65rem; color: var(--text-light); letter-spacing: 0.2em; font-family: 'Noto Sans JP', sans-serif; }

  .result-card {
    width: 100%; max-width: 360px; background: var(--white); border-radius: 20px;
    padding: 28px 24px; box-shadow: 0 8px 32px rgba(74,144,217,0.15), 0 2px 8px rgba(74,144,217,0.08);
    opacity: 0; transform: translateY(12px) scale(0.98);
    transition: opacity 0.4s ease, transform 0.4s ease;
    position: relative; z-index: 1; min-height: 110px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .result-card.visible { opacity: 1; transform: translateY(0) scale(1); }
  .card-location {
    font-size: 0.65rem; color: var(--blue); letter-spacing: 0.2em;
    background: var(--sky); padding: 3px 12px; border-radius: 20px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .card-text { font-size: 1.05rem; color: var(--text); text-align: center; line-height: 1.9; letter-spacing: 0.04em; }
  @keyframes pop-in { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
  .card-text.animating { animation: pop-in 0.4s ease forwards; }

  .reactions {
    display: flex; gap: 12px; opacity: 0; transform: translateY(6px);
    transition: opacity 0.4s ease 0.25s, transform 0.4s ease 0.25s;
    position: relative; z-index: 1; margin-top: 4px;
  }
  .reactions.visible { opacity: 1; transform: translateY(0); }
  .react-btn {
    background: var(--white); border: 1.5px solid var(--sky-deep); border-radius: 30px;
    padding: 8px 20px; font-size: 0.78rem; font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text-light); cursor: pointer; transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(74,144,217,0.1);
  }
  .react-btn:hover { background: var(--sky); border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }
  .react-btn.selected { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 4px 14px rgba(74,144,217,0.3); }

  .ripple {
    position: absolute; border-radius: 50%; background: rgba(74,144,217,0.2);
    transform: scale(0); animation: ripple-out 0.5s ease-out forwards; pointer-events: none;
  }
  @keyframes ripple-out { to { transform: scale(4); opacity: 0; } }

  .log-section {
    width: 100%; max-width: 360px; margin-top: 24px;
    position: relative; z-index: 1;
    display: none;
  }
  .log-section.visible { display: block; }

  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding: 0 4px;
  }
  .log-title {
    font-size: 0.72rem; color: var(--blue-dark); letter-spacing: 0.15em;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
  }
  .log-clear {
    background: none; border: 1px solid var(--sky-deep); border-radius: 20px;
    padding: 2px 10px; font-size: 0.65rem; color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    transition: all 0.2s ease;
  }
  .log-clear:hover { border-color: var(--blue); color: var(--blue); }

  .log-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .log-item {
    background: var(--white); border-radius: 14px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(74,144,217,0.1);
    animation: slide-in 0.3s ease forwards;
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .log-loc { font-size: 0.8rem; flex-shrink: 0; }
  .log-text { font-size: 0.82rem; color: var(--text); line-height: 1.5; flex: 1; }

  .share-section {
    width: 100%; max-width: 360px; margin-top: 16px;
    position: relative; z-index: 1;
    display: none;
  }
  .share-section.visible { display: block; }

  .share-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 4px;
  }
  .share-title {
    font-size: 0.72rem; color: var(--blue-dark); letter-spacing: 0.15em;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
  }
  .share-textarea {
    width: 100%; background: var(--white); border: 1.5px solid var(--sky-deep);
    border-radius: 14px; padding: 14px 16px;
    font-size: 0.82rem; font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text); line-height: 1.8; resize: none;
    box-shadow: 0 2px 8px rgba(74,144,217,0.08);
    outline: none; min-height: 130px;
    transition: border-color 0.2s ease;
  }
  .share-textarea:focus { border-color: var(--blue); }
  .copy-btn {
    margin-top: 8px; width: 100%;
    background: var(--blue); border: none; border-radius: 30px;
    padding: 10px; font-size: 0.78rem; font-family: 'Zen Maru Gothic', sans-serif;
    color: white; cursor: pointer; transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(74,144,217,0.25);
    letter-spacing: 0.1em;
  }
  .copy-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .copy-btn.copied { background: #5bb87a; }
  .share-footer {
    display: flex; justify-content: flex-end; align-items: center;
    margin-top: 4px; gap: 12px;
  }
  .char-count {
    font-size: 0.68rem; color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    transition: color 0.2s ease;
  }
  .char-count.over { color: #d94a4a; font-weight: 500; }

</style>
</head>

let currentLoc = 'home';
let lastIndex = -1;
let isDrawing = false;

function setLoc(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentLoc = el.dataset.loc;
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('reactions').classList.remove('visible');
  document.getElementById('gachaEmoji').textContent = '🌤️';
  lastIndex = -1;
}

function pickCard() {
  const pool = CARDS[currentLoc].cards;
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIndex && pool.length > 1);
  lastIndex = idx;
  return pool[idx];
}

function draw(e) {
  if (isDrawing) return;
  isDrawing = true;

  const btn = document.getElementById('gachaBtn');
  const rect = btn.getBoundingClientRect();
  const rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.cssText = 'width:60px;height:60px;left:' + (e.clientX-rect.left-30) + 'px;top:' + (e.clientY-rect.top-30) + 'px';
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 500);

  const emojis = CARDS[currentLoc].emoji;
  document.getElementById('gachaEmoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];

  const card = document.getElementById('resultCard');
  const reacts = document.getElementById('reactions');
  card.classList.remove('visible');
  reacts.classList.remove('visible');
  document.getElementById('btnYes').classList.remove('selected');
  document.getElementById('btnNo').classList.remove('selected');

  setTimeout(() => {
    const text = pickCard();
    document.getElementById('cardLocation').textContent = CARDS[currentLoc].label;
    const cardText = document.getElementById('cardText');
    cardText.textContent = text;
    cardText.classList.remove('animating');
    void cardText.offsetWidth;
    cardText.classList.add('animating');
    card.classList.add('visible');
    setTimeout(() => reacts.classList.add('visible'), 300);
    isDrawing = false;
  }, 280);
}

function react(type) {
  if (type === 'yes') {
    document.getElementById('gachaEmoji').textContent = '✨';
    addToLog();
  }
  const btn = document.getElementById(type === 'yes' ? 'btnYes' : 'btnNo');
  btn.classList.add('selected');
  setTimeout(() => drawNext(), 420);
}

function drawNext() {
  if (isDrawing) return;
  isDrawing = true;

  const card = document.getElementById('resultCard');
  const reacts = document.getElementById('reactions');

  card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
  card.style.opacity = '0';
  card.style.transform = 'translateY(-8px) scale(0.98)';
  reacts.style.opacity = '0';

  setTimeout(() => {
    document.getElementById('btnYes').classList.remove('selected');
    document.getElementById('btnNo').classList.remove('selected');
    card.style.transition = '';
    card.style.opacity = '';
    card.style.transform = '';

    const emojis = CARDS[currentLoc].emoji;
    document.getElementById('gachaEmoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];

    const text = pickCard();
    document.getElementById('cardLocation').textContent = CARDS[currentLoc].label;
    const cardText = document.getElementById('cardText');
    cardText.textContent = text;
    cardText.classList.remove('animating');
    void cardText.offsetWidth;
    cardText.classList.add('animating');

    card.classList.add('visible');
    reacts.style.opacity = '';
    setTimeout(() => reacts.classList.add('visible'), 250);
    isDrawing = false;
  }, 220);
}

const logItems = []; // {emoji, text}

function addToLog() {
  const text = document.getElementById('cardText').textContent;
  const loc = CARDS[currentLoc];
  logItems.unshift({ emoji: loc.emoji[0], text });

  const li = document.createElement('li');
  li.className = 'log-item';
  li.innerHTML = '<span class="log-loc">' + loc.emoji[0] + '</span><span class="log-text">' + text + '</span>';

  const list = document.getElementById('logList');
  list.insertBefore(li, list.firstChild);

  document.getElementById('logSection').classList.add('visible');
  updateShareText();
  document.getElementById('shareSection').classList.add('visible');
}

function updateShareText() {
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const lines = logItems.map(item => '✓ ' + item.text);
  const text = m + '/' + d + ' あったこと\n' + lines.join('\n') + '\n\n#あったね\nhttps://seu-yu.github.io/attane/';
  document.getElementById('shareText').value = text;
  const len = text.length;
  const counter = document.getElementById('charCount');
  counter.textContent = len + ' / 140';
  counter.classList.toggle('over', len > 140);
}

function copyShare() {
  const ta = document.getElementById('shareText');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピーする';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function clearLog() {
  document.getElementById('logList').innerHTML = '';
  logItems.length = 0;
  document.getElementById('logSection').classList.remove('visible');
  document.getElementById('shareSection').classList.remove('visible');
}
